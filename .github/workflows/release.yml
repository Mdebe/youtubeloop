name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.0.1, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Zip extension
        run: |
          cd dist
          zip -r../youtube-loop-v${{ steps.package-version.outputs.version }}.zip.
          cd..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: YouTube Loop v${{ steps.package-version.outputs.version }}
          body: |
            ## Features
            - Loop any section of YouTube videos
            - Keyboard shortcuts: `[` set start, `]` set end, `\` toggle loop
            - Auto-save loops per video
            - On-page controls injected into YouTube player
            - Popup controls as backup

            ## Installation
            1. Download `youtube-loop-v${{ steps.package-version.outputs.version }}.zip`
            2. Unzip the file
            3. Go to `chrome://extensions`
            4. Enable Developer Mode
            5. Click 'Load unpacked' and select the unzipped folder

            ## Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: |
            youtube-loop-v${{ steps.package-version.outputs.version }}.zip
          draft: false
          prerelease: false