name: Build Extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Zip extension
        run: |
          cd dist
          zip -r../youtube-loop-v${{ steps.pkg.outputs.version }}.zip.
          cd..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-loop-v${{ steps.pkg.outputs.version }}
          path: youtube-loop-v${{ steps.pkg.outputs.version }}.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Zip extension
        run: |
          cd dist
          zip -r../youtube-loop-v${{ steps.pkg.outputs.version }}.zip.
          cd..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YouTube Loop v${{ steps.pkg.outputs.version }}
          body: |
            ## Download
            `youtube-loop-v${{ steps.pkg.outputs.version }}.zip` below

            ## Install
            1. Unzip file
            2. Open `chrome://extensions`
            3. Enable Developer Mode
            4. Load unpacked → select unzipped folder
          files: youtube-loop-v${{ steps.pkg.outputs.version }}.zip